<!DOCTYPE html>
<html>

<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.

  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Seapruma">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Seapruma">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <meta name="theme-color" content="#1a1110">

  <!-- Fonts preconnect -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png" />

  <title>Seapruma</title>
  <link rel="manifest" href="manifest.json">

  <style>
    html,
    body,
    flutter-view,
    canvas {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      background-color: #1a1110;
      opacity: 1 !important;
      display: block !important;
    }
  </style>

  <script>
    (function () {
      // Função para anexar os listeners no canvas do Flutter/Skwasm
      function attachWebGLProtection(canvas) {
        if (canvas._hasWebGLProtection) return;
        canvas._hasWebGLProtection = true;

        canvas.addEventListener('webglcontextlost', function (event) {
          // Previne o comportamento padrão do browser para permitir tratamento customizado
          event.preventDefault();
          console.warn('[PWA/Flutter] WebGL Context Lost detectado. Recarregando app...');

          // Recarrega a aplicação para restaurar o pipeline gráfico
          window.location.reload();
        }, false);
      }

      // 1. Escuta a criação dinâmica do elemento <canvas> pelo Flutter Engine
      const observer = new MutationObserver(function (mutations) {
        for (const mutation of mutations) {
          for (const node of mutation.addedNodes) {
            if (node.nodeName === 'CANVAS') {
              attachWebGLProtection(node);
            } else if (node.querySelectorAll) {
              const canvases = node.querySelectorAll('canvas');
              canvases.forEach(attachWebGLProtection);
            }
          }
        }
      });

      // Inicia a observação no DOM assim que o script carregar
      document.addEventListener('DOMContentLoaded', function () {
        observer.observe(document.body, { childList: true, subtree: true });

        // Procura se já existe algum canvas inserido
        document.querySelectorAll('canvas').forEach(attachWebGLProtection);
      });

      // 2. Fallback por Ciclo de Vida: Checa se a página voltou do segundo plano
      let hiddenTime = 0;

      document.addEventListener('visibilitychange', function () {
        if (document.visibilityState === 'hidden') {
          hiddenTime = Date.now();
        } else if (document.visibilityState === 'visible') {
          // Se o app ficou em segundo plano por mais de 30 segundos,
          // forçamos um reload preventivo caso o contexto tenha morrido silenciosamente
          const timeBackground = Date.now() - hiddenTime;
          if (hiddenTime > 0 && timeBackground > 30000) {
            console.warn('[PWA/Flutter] Retornando após tempo prolongado em background. Recarregando...');
            window.location.reload();
          }
        }
      });
    })();
  </script>
</head>

<body>
  <script src="flutter_bootstrap.js" async></script>
</body>

</html>
